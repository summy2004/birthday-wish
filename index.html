<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday Shaka</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0c0204; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .box { border: 1px solid #ff96ac; padding: 25px 20px; border-radius: 15px; background: rgba(255,255,255,0.03); max-width: 350px; margin: 50px auto; box-shadow: 0 0 15px rgba(255,140,160,0.2); }
        .btn { background: #ff96ac; color: #0c0204; border: none; padding: 12px 30px; border-radius: 20px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .hidden { display: none; }
        input { padding: 10px; border-radius: 10px; border: 1px solid #ff96ac; background: transparent; color: white; text-align: center; width: 80%; }
        .birthday-pic { width: 100%; max-width: 280px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #ff96ac; }
    </style>
</head>
<body>

    <!-- SCREEN 1: LOCK -->
    <div id="screen1" class="box">
        <h3>Enter Password 🔒</h3>
        <input type="number" id="pass" placeholder="Enter Year">
        <br><button class="btn" onclick="checkPass()">Unlock</button>
    </div>

    <!-- SCREEN 2: CANDLE -->
    <div id="screen2" class="box hidden">
        <h3>Blow the candle! 🕯️</h3>
        <h1 style="font-size: 80px;">🎂</h1>
        <button class="btn" onclick="nextScreen('screen3')">Blow! 💨</button>
    </div>

    <!-- SCREEN 3: LETTER & PICS -->
    <div id="screen3" class="box hidden" style="text-align: left;">
        <h3 style="text-align: center; color: #ff96ac;">Happy Birthday Shaka 🌸</h3>
        <div style="text-align: center;">
            <img src="https://i.ibb.co/MytJybFk/image.jpg" class="birthday-pic">
            <img src="https://i.ibb.co/XfQjgR9v/image.jpg" class="birthday-pic">
        </div>
        <p style="font-size: 14px;">27 June is finally here! 🎂<br><br>
        Happy Birthday to the person who knows me better than anyone else. I'm sorry for being difficult sometimes, but please know u mean everything to me. Let's promise to stay exactly like this forever.🫶🏻</p>
    </div>

    <script>
        function checkPass() {
            if(document.getElementById('pass').value == "2026") {
                document.getElementById('screen1').style.display = 'none';
                document.getElementById('screen2').style.display = 'block';
            } else { alert("Wrong password!"); }
        }
        function nextScreen(id) {
            document.getElementById('screen2').style.display = 'none';
            document.getElementById(id).style.display = 'block';
        }
    </script>
</body>
</html>
